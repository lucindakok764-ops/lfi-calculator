<!DOCTYPE html>
<html lang="nl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>LFI Calculator Pro</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

<header class="titleBar">

<h1>LFI Calculator Pro</h1>

</header>

<table class="inputTable">

<thead>

<tr>

<th></th>

<th>500</th>
<th>1000</th>
<th>2000</th>

</tr>

</thead>

<tbody>

<tr class="right">

<td>R LG</td>

<td><input id="adac500" maxlength="3"></td>

<td><input id="adac1000" maxlength="3"></td>

<td><input id="adac2000" maxlength="3"></td>

</tr>

<tr class="right">

<td>R BG</td>

<td><input id="adbc500" maxlength="3"></td>

<td><input id="adbc1000" maxlength="3"></td>

<td><input id="adbc2000" maxlength="3"></td>

</tr>

<tr class="left">

<td>L LG</td>

<td><input id="asac500" maxlength="3"></td>

<td><input id="asac1000" maxlength="3"></td>

<td><input id="asac2000" maxlength="3"></td>

</tr>

<tr class="left">

<td>L BG</td>

<td><input id="asbc500" maxlength="3"></td>

<td><input id="asbc1000" maxlength="3"></td>

<td><input id="asbc2000" maxlength="3"></td>

</tr>

</tbody>

</table>

<div class="summaryPanel">

<div class="summaryTitle">

Samenvatting

</div>

<table class="summaryTable">

<thead>

<tr>

<th></th>

<th>R</th>

<th>L</th>

</tr>

</thead>

<tbody>

<tr>

<td>LG</td>

<td id="sumADAC">--</td>

<td id="sumASAC">--</td>

</tr>

<tr>

<td>BG</td>

<td id="sumADBC">--</td>

<td id="sumASBC">--</td>

</tr>

<tr class="plus60">

<td>BG +60</td>

<td id="sumADBC60">--</td>

<td id="sumASBC60">--</td>

</tr>

</tbody>

</table>

</div>

<footer class="buttonPanel">

<button id="clearBtn">

Wis

</button>

<button id="copyBtn">

Kopieer

</button>

<button onclick="window.print()">

Print

</button>

</footer>

</div>

<script src="script.js"></script>

</body>

</html>
