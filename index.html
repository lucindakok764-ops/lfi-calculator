<!DOCTYPE html>
<html lang="nl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LFI Calculator Pro 4.0</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

    <div class="titlebar">
        <h1>LFI Calculator Pro</h1>
    </div>

    <!-- RESULTATEN -->

    <div class="resultBox">

        <div class="resultTitle">
            Resultaat
        </div>

        <table class="resultTable">

            <tr>

                <th></th>
                <th>AD</th>
                <th>AS</th>

            </tr>

            <tr>

                <td>AC</td>

                <td id="sumADAC">--</td>

                <td id="sumASAC">--</td>

            </tr>

            <tr>

                <td>BC</td>

                <td id="sumADBC">--</td>

                <td id="sumASBC">--</td>

            </tr>

            <tr class="green">

                <td>BC +60</td>

                <td id="sumADBC60">--</td>

                <td id="sumASBC60">--</td>

            </tr>

        </table>

    </div>

    <!-- INVOER -->

    <table class="inputTable">

        <tr>

            <th></th>

            <th>500</th>

            <th>1000</th>

            <th>2000</th>

        </tr>

        <tr class="ad">

            <td>AD AC</td>

            <td><input id="adac500" maxlength="3"></td>

            <td><input id="adac1000" maxlength="3"></td>

            <td><input id="adac2000" maxlength="3"></td>

        </tr>

        <tr class="ad">

            <td>AD BC</td>

            <td><input id="adbc500" maxlength="3"></td>

            <td><input id="adbc1000" maxlength="3"></td>

            <td><input id="adbc2000" maxlength="3"></td>

        </tr>

        <tr class="as">

            <td>AS AC</td>

            <td><input id="asac500" maxlength="3"></td>

            <td><input id="asac1000" maxlength="3"></td>

            <td><input id="asac2000" maxlength="3"></td>

        </tr>

        <tr class="as">

            <td>AS BC</td>

            <td><input id="asbc500" maxlength="3"></td>

            <td><input id="asbc1000" maxlength="3"></td>

            <td><input id="asbc2000" maxlength="3"></td>

        </tr>

    </table>

    <!-- SRT -->

    <div class="srtBox">

        <label>

            SRT AD

            <input id="srtAD">

            dB HL

        </label>

        <label>

            SRT AS

            <input id="srtAS">

            dB HL

        </label>

    </div>

    <!-- KNOPPEN -->

    <div class="buttonBar">

        <button id="clearBtn">

            Wis

        </button>

        <button id="copyBtn">

            Kopieer

        </button>

        <button onclick="window.print()">

            Print

        </button>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
