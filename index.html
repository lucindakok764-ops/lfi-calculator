<!DOCTYPE html>
<html lang="nl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LFI Calculator Pro 5.0</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

    <!-- Titel -->

    <header class="titleBar">

        <h1>LFI Calculator Pro</h1>

    </header>

    <!-- Invoer -->

    <section class="inputPanel">

        <table class="inputTable">

            <thead>

                <tr>

                    <th></th>
                    <th>500</th>
                    <th>1000</th>
                    <th>2000</th>

                </tr>

            </thead>

            <tbody>

                <tr class="ad">

                    <td>AD AC</td>

                    <td><input id="adac500" maxlength="3"></td>

                    <td><input id="adac1000" maxlength="3"></td>

                    <td><input id="adac2000" maxlength="3"></td>

                </tr>

                <tr class="ad">

                    <td>AD BC</td>

                    <td><input id="adbc500" maxlength="3"></td>

                    <td><input id="adbc1000" maxlength="3"></td>

                    <td><input id="adbc2000" maxlength="3"></td>

                </tr>

                <tr class="as">

                    <td>AS AC</td>

                    <td><input id="asac500" maxlength="3"></td>

                    <td><input id="asac1000" maxlength="3"></td>

                    <td><input id="asac2000" maxlength="3"></td>

                </tr>

                <tr class="as">

                    <td>AS BC</td>

                    <td><input id="asbc500" maxlength="3"></td>

                    <td><input id="asbc1000" maxlength="3"></td>

                    <td><input id="asbc2000" maxlength="3"></td>

                </tr>

            </tbody>

        </table>

    </section>

    <!-- SRT -->

    <section class="srtPanel">

        <div>

            <label>SRT AD</label>

            <input id="srtAD" maxlength="3">

            <span>dB HL</span>

        </div>

        <div>

            <label>SRT AS</label>

            <input id="srtAS" maxlength="3">

            <span>dB HL</span>

        </div>

    </section>

    <!-- Samenvatting -->

    <section class="summaryPanel">

        <div class="summaryTitle">

            Samenvatting

        </div>

        <table class="summaryTable">

            <thead>

                <tr>

                    <th></th>

                    <th>AD</th>

                    <th>AS</th>

                </tr>

            </thead>

            <tbody>

                <tr>

                    <td>AC</td>

                    <td id="sumADAC">--</td>

                    <td id="sumASAC">--</td>

                </tr>

                <tr>

                    <td>BC</td>

                    <td id="sumADBC">--</td>

                    <td id="sumASBC">--</td>

                </tr>

                <tr class="plus60">

                    <td>BC +60</td>

                    <td id="sumADBC60">--</td>

                    <td id="sumASBC60">--</td>

                </tr>

            </tbody>

        </table>

    </section>

    <!-- Knoppen -->

    <footer class="buttonPanel">

        <button id="clearBtn">

            Wis

        </button>

        <button id="copyBtn">

            Kopieer

        </button>

        <button id="printBtn" onclick="window.print()">

            Print

        </button>

    </footer>

</div>

<script src="script.js"></script>

</body>

</html>
